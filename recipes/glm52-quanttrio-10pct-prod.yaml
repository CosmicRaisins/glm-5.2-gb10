# GLM-5.2 PROD (promoted 2026-06-27): QuantTrio Int4-Int8Mix 10pct — replaces AWQ as daily driver.
# Serves as "glm-5.2-quanttrio" (LiteLLM model "GLM 5.2" → this; user-facing name unchanged). In-checkpoint MTP k=4
# (single model, no separate drafter), MNBT 4096, cudagraph FULL, ctx 348160 (85*4096, max under the
# measured 351,168-tok KV @ gmu 0.92). Parity w/ AWQ on speed (decode ~20-22, prefill ~498-509);
# quality edge (10% prune + INT8 attn) + bigger ctx. Uses per-node local HF cache, not shared NFS. AWQ recipe retained as fallback on .129 storage.
# 2026-07-03: fp8 decode head-padding 64->32 (back199640, GB10 forum) then 32->16 (this
# repo, CHANGES.md #6) — delivered by kernels/flashmla_sparse.py, no recipe flag needed.
# Prefill by pad width, d0/8k/32k: 498/509/461 (64) -> 666/671/592 (32) -> 722/736/626 (16);
# decode pad-neutral (~21-24, MTP-acceptance-dominated), MTP k=4, coherent. k=5 benched as
# a net regression (see README). --async-scheduling explicit (was already auto-on for mtp).
recipe_version: "1"
name: GLM-5.2-prod
description: GLM-5.2 PROD = QuantTrio Int4-Int8Mix 10pct, TP=4 mp, in-checkpoint MTP k=4, MNBT 4096, ctx 348160, cudagraph FULL
raw_entrypoint: true
shared_weights_nfs: false
cluster_nodes: [192.168.200.12, 192.168.200.13, 192.168.200.14, 192.168.200.15]  # EDIT: your node rail IPs
container: vllm-node-tf5-glm52-b12x:probe-20260621
model: /cache/huggingface/hub/glm52-quanttrio-10pct
cluster_only: true
defaults:
  port: 8210
env:
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "1800"
  LD_PRELOAD: /cache/huggingface/hub/nccl-2.30.4/libnccl.so.2
  HF_HOME: /cache/huggingface
  TRITON_CACHE_DIR: /cache/huggingface/.tritoncache
  HF_HUB_OFFLINE: "1"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
  GLM52_BIND_HOST_TRITON: "1"
  GLM52_MQA_LOGITS_TRITON: "1"
  GLM52_PAGED_MQA_TRITON: "1"
  GLM52_PAGED_MQA_TOPK_CHUNK_SIZE: "8192"
  GLM52_B12X_MLA: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  NCCL_NET: IB
  NCCL_IB_DISABLE: "0"
  NCCL_IB_HCA: "rocep1s0f0,roceP2p1s0f0"                   # EDIT: your RoCE/IB HCAs (ibdev2netdev)
  NCCL_SOCKET_IFNAME: "enP7s7,enp1s0f0np0,enP2p1s0f0np0"   # EDIT: your interfaces (ip link)
  GLOO_SOCKET_IFNAME: "enp1s0f0np0"                        # EDIT: your rail-1 interface
  NCCL_IB_GID_INDEX: "3"
  NCCL_CROSS_NIC: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_DEBUG: WARN
command: |
  vllm serve /cache/huggingface/hub/glm52-quanttrio-10pct
  --served-model-name glm-5.2-quanttrio --host 0.0.0.0 --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice --enable-prefix-caching --speculative-config '{{"model":"/cache/huggingface/hub/glm52-quanttrio-10pct","method":"mtp","num_speculative_tokens":4,"attention_backend":"FLASHMLA_SPARSE"}}'
  --tensor-parallel-size 4 --pipeline-parallel-size 1
  --max-model-len 327680 --max-num-seqs 1 --max-num-batched-tokens 4096 --gpu-memory-utilization 0.92 --kv-cache-dtype fp8_ds_mla
  --async-scheduling --distributed-executor-backend mp --compilation-config '{{"cudagraph_mode":"FULL"}}'
